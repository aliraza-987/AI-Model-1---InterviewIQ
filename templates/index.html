<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewIQ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #FAFAF9;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F5F5F4;
            --text-primary: #0A0A0A;
            --text-secondary: #737373;
            --text-tertiary: #A3A3A3;
            --border-primary: #E7E5E4;
            --border-secondary: #D6D3D1;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --accent-light: #DBEAFE;
            --success: #059669;
            --warning: #D97706;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        [data-theme="dark"] {
            --bg-primary: #0F0F0F;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #262626;
            --text-primary: #FAFAFA;
            --text-secondary: #A3A3A3;
            --text-tertiary: #737373;
            --border-primary: #262626;
            --border-secondary: #404040;
            --accent-light: #1E3A8A;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Topbar */
        .topbar {
            height: 52px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: relative;
            z-index: 100;
        }
        
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .app-name {
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.01em;
        }
        
        .session-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .session-info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .session-info-value {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.15s ease;
        }
        
        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .btn-new {
            height: 32px;
            padding: 0 12px;
            border-radius: 6px;
            border: 1px solid var(--border-primary);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s ease;
        }
        
        .btn-new:hover {
            border-color: var(--border-secondary);
            box-shadow: var(--shadow-sm);
        }
        
        /* Main content */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        /* Chat container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 0;
        }
        
        .messages-wrapper::-webkit-scrollbar {
            width: 8px;
        }
        
        .messages-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .messages-wrapper::-webkit-scrollbar-thumb {
            background: var(--border-secondary);
            border-radius: 4px;
        }
        
        /* Messages */
        .message-group {
            margin-bottom: 32px;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .message-avatar.user {
            background: var(--accent);
            color: white;
        }
        
        .message-avatar.ai {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
        }
        
        .message-name {
            font-size: 13px;
            font-weight: 600;
        }
        
        .message-content {
            padding-left: 36px;
            color: var(--text-primary);
            line-height: 1.7;
        }
        
        .message-content p {
            margin: 0 0 12px 0;
        }
        
        .message-content p:last-child {
            margin-bottom: 0;
        }
        
        .message-content strong {
            font-weight: 600;
        }
        
        .message-content code:not(pre code) {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            border: 1px solid var(--border-primary);
        }
        
        .message-content pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 16px 0;
        }
        
        .message-content pre code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .message-content ul,
        .message-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }
        
        .message-content li {
            margin: 6px 0;
        }
        
        .message-actions {
            padding-left: 36px;
            margin-top: 8px;
            display: flex;
            gap: 4px;
        }
        
        .message-action-btn {
            width: 28px;
            height: 28px;
            border-radius: 5px;
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.15s ease;
        }
        
        .message-action-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }
        
        .message-action-btn.active {
            color: var(--accent);
        }
        
        /* Typing indicator */
        .typing-indicator {
            margin-bottom: 32px;
        }
        
        .typing-dots {
            padding-left: 36px;
            display: flex;
            gap: 4px;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-tertiary);
            animation: typingPulse 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
        
        /* Welcome state */
        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            padding: 48px 24px;
        }
        
        .welcome-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }
        
        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .interview-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 700px;
        }
        
        .interview-option {
            padding: 20px;
            border: 1px solid var(--border-primary);
            border-radius: 10px;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }
        
        .interview-option:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .interview-option-icon {
            font-size: 24px;
            margin-bottom: 12px;
            display: block;
        }
        
        .interview-option-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .interview-option-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        /* Input area */
        .input-area {
            padding: 16px 24px 24px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-primary);
        }
        
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 8px;
            transition: all 0.15s ease;
        }
        
        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        
        .input-tools {
            display: flex;
            gap: 4px;
        }
        
        .input-tool-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.15s ease;
        }
        
        .input-tool-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .input-tool-btn.recording {
            color: #EF4444;
            animation: recordingPulse 1.5s infinite;
        }
        
        @keyframes recordingPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        #userInput {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            resize: none;
            max-height: 200px;
            padding: 6px 8px;
            line-height: 1.5;
        }
        
        #userInput::placeholder {
            color: var(--text-tertiary);
        }
        
        #sendBtn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }
        
        #sendBtn:hover {
            background: var(--accent-hover);
        }
        
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .session-info {
                display: none;
            }
            
            .topbar {
                padding: 0 12px;
            }
            
            .messages-wrapper {
                padding: 16px 16px 0;
            }
            
            .input-area {
                padding: 12px 12px 16px;
            }
            
            .interview-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="app-name">InterviewIQ</div>
            <div class="session-info">
                <div class="session-info-item">
                    <span>⏱</span>
                    <span class="session-info-value" id="sessionTime">0:00</span>
                </div>
                <div class="session-info-item">
                    <span>💬</span>
                    <span class="session-info-value" id="messageCount">0</span>
                </div>
                <div class="session-info-item" id="typeDisplay" style="display: none;">
                    <span>📋</span>
                    <span class="session-info-value" id="interviewType"></span>
                </div>
            </div>
        </div>
        <div class="topbar-right">
            <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">🌓</button>
            <button class="btn-new" onclick="clearChat()">
                <span>↻</span>
                <span>New</span>
            </button>
        </div>
    </div>
    
    <!-- Main -->
    <div class="main-content">
        <div class="chat-container">
            <div class="messages-wrapper" id="chatBox">
                <!-- Welcome state -->
                <div class="welcome-state" id="welcomeState">
                    <div class="welcome-title">What would you like to practice?</div>
                    <div class="welcome-subtitle">Choose an interview type to get started</div>
                    
                    <div class="interview-options">
                        <div class="interview-option" onclick="startInterview('coding')">
                            <span class="interview-option-icon">💻</span>
                            <div class="interview-option-title">Coding Interview</div>
                            <div class="interview-option-desc">Practice algorithms and data structures</div>
                        </div>
                        
                        <div class="interview-option" onclick="startInterview('behavioral')">
                            <span class="interview-option-icon">💬</span>
                            <div class="interview-option-title">Behavioral Interview</div>
                            <div class="interview-option-desc">Master the STAR method</div>
                        </div>
                        
                        <div class="interview-option" onclick="startInterview('system design')">
                            <span class="interview-option-icon">🏗</span>
                            <div class="interview-option-title">System Design</div>
                            <div class="interview-option-desc">Design scalable systems</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Input -->
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-tools">
                        <button class="input-tool-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice input">🎤</button>
                    </div>
                    <textarea id="userInput" placeholder="Type a message..." rows="1"></textarea>
                    <button id="sendBtn" onclick="sendMessage()">↑</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });
        
        let sessionStartTime = Date.now();
        let messageCount = 0;
        let currentType = null;
        let recognition = null;
        let isRecording = false;
        
        // Speech recognition
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                stopVoice();
            };
            recognition.onerror = stopVoice;
            recognition.onend = stopVoice;
        }
        
        // Session timer
        setInterval(() => {
            const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
            const m = Math.floor(elapsed / 60);
            const s = elapsed % 60;
            document.getElementById('sessionTime').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }, 1000);
        
        // Auto-resize textarea
        const textarea = document.getElementById('userInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
        
        function startInterview(type) {
            currentType = type;
            document.getElementById('welcomeState').remove();
            document.getElementById('typeDisplay').style.display = 'flex';
            document.getElementById('interviewType').textContent = type.charAt(0).toUpperCase() + type.slice(1);
            
            addMessage(`I'd like to practice ${type} interviews`, 'user');
            
            fetch('/interview', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Start a ${type} interview` })
            })
            .then(r => r.json())
            .then(d => addMessage(d.response, 'ai'))
            .catch(() => addMessage('Connection error', 'ai'));
        }
        
        function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            messageCount++;
            document.getElementById('messageCount').textContent = messageCount;
            
            addMessage(msg, 'user');
            input.value = '';
            input.style.height = 'auto';
            
            showTyping();
            
            fetch('/interview', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            })
            .then(r => r.json())
            .then(d => {
                hideTyping();
                addMessage(d.response, 'ai');
            })
            .catch(() => {
                hideTyping();
                addMessage('Connection error', 'ai');
            });
        }
        
        function addMessage(text, role) {
            const chatBox = document.getElementById('chatBox');
            const group = document.createElement('div');
            group.className = 'message-group';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            
            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${role}`;
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const name = document.createElement('div');
            name.className = 'message-name';
            name.textContent = role === 'user' ? 'You' : 'Interviewer';
            
            header.appendChild(avatar);
            header.appendChild(name);
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            if (role === 'ai') {
                content.innerHTML = marked.parse(text);
                
                const actions = document.createElement('div');
                actions.className = 'message-actions';
                actions.innerHTML = `
                    <button class="message-action-btn" onclick="feedback(this, 'up')">👍</button>
                    <button class="message-action-btn" onclick="feedback(this, 'down')">👎</button>
                `;
                group.appendChild(header);
                group.appendChild(content);
                group.appendChild(actions);
            } else {
                content.textContent = text;
                group.appendChild(header);
                group.appendChild(content);
            }
            
            chatBox.appendChild(group);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function showTyping() {
            const chatBox = document.getElementById('chatBox');
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typing';
            typing.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar ai">🤖</div>
                    <div class="message-name">Interviewer</div>
                </div>
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatBox.appendChild(typing);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        function feedback(btn, type) {
            btn.classList.add('active');
            btn.disabled = true;
        }
        
        function toggleVoice() {
            if (!recognition) return alert('Voice not supported');
            if (isRecording) {
                stopVoice();
            } else {
                isRecording = true;
                document.getElementById('voiceBtn').classList.add('recording');
                recognition.start();
            }
        }
        
        function stopVoice() {
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
            if (recognition) recognition.stop();
        }
        
        function clearChat() {
            if (confirm('Start new interview?')) location.reload();
        }
        
        function toggleTheme() {
            document.body.dataset.theme = document.body.dataset.theme === 'dark' ? '' : 'dark';
        }
        
        // Enter to send (Shift+Enter for new line)
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
