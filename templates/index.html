<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewIQ - AI Mock Interview</title>
    <!-- Built this during spring break - wanted to practice interviews without bugging friends -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            padding: 30px 20px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            color: #ffffff;
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95em;
            font-weight: 400;
        }
        
        /* Chat area - scrollable */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        
        .message {
            padding: 14px 18px;
            border-radius: 12px;
            max-width: 70%;
            animation: slideIn 0.3s ease-out;
            line-height: 1.6;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            text-align: right;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .ai-message {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-right: auto;
        }
        
        /* Input area - FIXED at bottom */
        .input-container {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .input-area {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }
        
        #userInput {
            flex: 1;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
        }
        
        #userInput::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        #userInput:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        #sendBtn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        #sendBtn:active {
            transform: translateY(0);
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }
            
            .message {
                max-width: 85%;
            }
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            max-width: 70px;
            margin-right: auto;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.6;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 InterviewIQ</h1>
        <p class="subtitle">AI-Powered Technical Interview Practice</p>
        <button onclick="clearChat()" style="margin-top: 15px; padding: 8px 20px; background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s;">🔄 Start New Interview</button>
    </div>
    
    <div class="chat-container" id="chatBox">
        <div class="message ai-message">
            Hey! I'm your AI interviewer. What type of interview would you like to practice today?
        </div>
        <div class="message ai-message" style="display: flex; gap: 10px; max-width: 100%; flex-wrap: wrap;">
            <button onclick="startInterview('coding')" style="padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">💻 Coding Interview</button>
            <button onclick="startInterview('behavioral')" style="padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">🗣️ Behavioral Interview</button>
            <button onclick="startInterview('system design')" style="padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">🏗️ System Design</button>
        </div>
    </div>
    
    <div class="input-container">
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message..." />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function startInterview(type) {
            // Hide the buttons after selection
            const buttons = document.querySelectorAll('button[onclick^="startInterview"]');
            buttons.forEach(btn => btn.parentElement.style.display = 'none');
            
            // Send the interview type selection
            addMessage(`I'd like to practice ${type} interviews`, 'user-message');
            
            fetch('/interview', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: `Start a ${type} interview` })
            })
            .then(response => response.json())
            .then(data => {
                addMessage(data.response, 'ai-message');
            })
            .catch(error => {
                addMessage('Error: Could not connect to AI', 'ai-message');
            });
        }
        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, 'user-message');
            input.value = '';
            
            // Show typing indicator
            const chatBox = document.getElementById('chatBox');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            fetch('/interview', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                // Remove typing indicator
                const typing = document.getElementById('typing');
                if (typing) typing.remove();
                
                addMessage(data.response, 'ai-message');
            })
            .catch(error => {
                // Remove typing indicator
                const typing = document.getElementById('typing');
                if (typing) typing.remove();
                
                addMessage('Error: Could not connect to AI', 'ai-message');
            });
        }
        
        function addMessage(text, className) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + className;
            messageDiv.textContent = text;
            
            // Add feedback buttons only for AI messages
            if (className === 'ai-message') {
                const feedbackDiv = document.createElement('div');
                feedbackDiv.style.cssText = 'margin-top: 8px; display: flex; gap: 8px; font-size: 18px;';
                feedbackDiv.innerHTML = `
                    <button onclick="this.style.opacity='0.3'; this.disabled=true;" style="background: none; border: none; cursor: pointer; font-size: 18px; transition: opacity 0.3s;" title="Helpful">👍</button>
                    <button onclick="this.style.opacity='0.3'; this.disabled=true;" style="background: none; border: none; cursor: pointer; font-size: 18px; transition: opacity 0.3s;" title="Not helpful">👎</button>
                `;
                messageDiv.appendChild(feedbackDiv);
            }
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        function clearChat() {
            // Clear the chat display
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = `
                <div class="message ai-message">
                    Hey! I'm your AI interviewer. What type of interview would you like to practice today?
                </div>
                <div class="message ai-message" style="display: flex; gap: 10px; max-width: 100%; flex-wrap: wrap;">
                    <button onclick="startInterview('coding')" style="padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">💻 Coding Interview</button>
                    <button onclick="startInterview('behavioral')" style="padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">🗣️ Behavioral Interview</button>
                    <button onclick="startInterview('system design')" style="padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">🏗️ System Design</button>
                </div>
            `;
            
            // Clear server-side session by reloading the page
            location.reload();
        }
    </script>
    <div style="text-align: center; padding: 20px; color: rgba(255, 255, 255, 0.5); font-size: 14px;">
        Built by <a href="https://github.com/aliraza-987" target="_blank" style="color: #667eea; text-decoration: none; font-weight: 600;">Ali Raza</a> | 
        <a href="https://github.com/aliraza-987/AI-Model-1---InterviewIQ" target="_blank" style="color: #667eea; text-decoration: none;">View Source</a>
    </div>
</body>
</html>
